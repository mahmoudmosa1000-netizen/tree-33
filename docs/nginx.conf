# nginx.conf — Tree of Knowledge auf eigenem Server
# Einbinden in: /etc/nginx/sites-available/tree-of-knowledge

server {
    listen 80;
    listen [::]:80;
    server_name deine-domain.de www.deine-domain.de;

    # HTTP → HTTPS Redirect
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name deine-domain.de www.deine-domain.de;

    # SSL (Let's Encrypt via certbot)
    ssl_certificate     /etc/letsencrypt/live/deine-domain.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deine-domain.de/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root  /var/www/tree-of-knowledge;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript;
    gzip_min_length 1024;

    # Sicherheits-Header
    add_header X-Frame-Options          "DENY"                              always;
    add_header X-Content-Type-Options   "nosniff"                           always;
    add_header X-XSS-Protection         "1; mode=block"                    always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Cache für HTML: kurz (Inhalt ändert sich)
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=3600";
    }

    # Alle Pfade → index.html (Hash-Routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Logging
    access_log /var/log/nginx/tree-of-knowledge.access.log;
    error_log  /var/log/nginx/tree-of-knowledge.error.log;
}